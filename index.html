<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Colorimetría - Tipo de Rostro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .pregunta {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .botones {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn-si {
            background: #4CAF50;
            color: white;
        }

        .btn-no {
            background: #f44336;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .resultado {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .resultado h2 {
            margin-bottom: 15px;
        }

        .resultado p {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }

        .resultado .descripcion {
            font-size: 16px;
            font-weight: normal;
            opacity: 0.9;
        }

        .reiniciar {
            margin-top: 20px;
            background: #ffc107;
            color: #333;
        }

        .oculto {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🎨 Test de Colorimetría</h1>
        <div class="subtitle">Descubre la forma de tu rostro</div>

        <div id="preguntaContainer">
            <div class="pregunta" id="preguntaTexto"></div>
            <div class="botones">
                <button class="btn btn-si" id="btnSi">✅ Sí</button>
                <button class="btn btn-no" id="btnNo">❌ No</button>
            </div>
        </div>

        <div id="resultadoContainer" class="oculto">
            <div class="resultado">
                <h2>✨ Tu tipo de rostro es ✨</h2>
                <p id="resultadoTexto"></p>
                <div class="descripcion" id="resultadoDescripcion"></div>
                <button class="btn reiniciar" id="btnReiniciar">🔄 Volver a empezar</button>
            </div>
        </div>
    </div>

    <script>
        // Definición del árbol de decisiones
        const arbol = {
            p1: {
                texto: "¿Tu rostro es más largo que ancho?",
                si: "p2",
                no: "p3"
            },
            p2: {
                texto: "¿Tu mandíbula y frente son angulosas?",
                si: "rectangulo",
                no: "ovalado"
            },
            p3: {
                texto: "¿El largo y ancho de tu rostro es igual?",
                si: "p4",
                no: "p5"
            },
            p4: {
                texto: "¿Tu mandíbula y frente son más redondeadas?",
                si: "redondo",
                no: "cuadrado"
            },
            p5: {
                texto: "¿Tu mandíbula es más ancha que tu frente?",
                si: "triangulo",
                no: "p6"
            },
            p6: {
                texto: "¿Tu frente es lo más ancho de tu rostro?",
                si: "corazon",
                no: "p7"
            },
            p7: {
                texto: "¿Tus pómulos son lo más marcado de tu rostro?",
                si: "diamante",
                no: "p1"
            }
        };

        // Descripciones de cada tipo de rostro
        const descripciones = {
            rectangulo: {
                nombre: "RECTÁNGULO",
                descripcion: "Tu rostro es alargado con líneas angulosas. Los looks estructurados te favorecen mucho."
            },
            ovalado: {
                nombre: "OVALADO",
                descripcion: "Tu rostro es equilibrado y versátil. ¡Casi cualquier estilo te queda bien!"
            },
            redondo: {
                nombre: "REDONDO",
                descripcion: "Tu rostro tiene líneas suaves y curvas. Los looks que alargan visualmente te favorecen."
            },
            cuadrado: {
                nombre: "CUADRADO",
                descripcion: "Tu rostro tiene una mandíbula marcada y angular. Los looks que suavizan las líneas te van genial."
            },
            triangulo: {
                nombre: "TRIÁNGULO",
                descripcion: "Tu mandíbula es más ancha que tu frente. Los looks que dan volumen en la parte superior te equilibran."
            },
            corazon: {
                nombre: "CORAZÓN o TRIÁNGULO INVERTIDO",
                descripcion: "Tu frente es más ancha que tu mandíbula. Los looks que equilibran la parte inferior te favorecen."
            },
            diamante: {
                nombre: "DIAMANTE",
                descripcion: "Tus pómulos son lo más ancho de tu rostro. Los looks que suavizan los pómulos te van espectacular."
            }
        };

        let estadoActual = "p1";

        // Elementos del DOM
        const preguntaContainer = document.getElementById("preguntaContainer");
        const resultadoContainer = document.getElementById("resultadoContainer");
        const preguntaTexto = document.getElementById("preguntaTexto");
        const resultadoTexto = document.getElementById("resultadoTexto");
        const resultadoDescripcion = document.getElementById("resultadoDescripcion");
        const btnSi = document.getElementById("btnSi");
        const btnNo = document.getElementById("btnNo");
        const btnReiniciar = document.getElementById("btnReiniciar");

        function mostrarPregunta(clave) {
            const nodo = arbol[clave];
            if (nodo && nodo.texto) {
                // Es una pregunta, mostramos el formulario
                preguntaTexto.textContent = nodo.texto;
                preguntaContainer.classList.remove("oculto");
                resultadoContainer.classList.add("oculto");
                estadoActual = clave;
            } else {
                // Es un resultado final
                const resultado = descripciones[clave];
                if (resultado) {
                    resultadoTexto.textContent = resultado.nombre;
                    resultadoDescripcion.textContent = resultado.descripcion;
                } else {
                    resultadoTexto.textContent = clave.toUpperCase();
                    resultadoDescripcion.textContent = "¡Descubriste la forma de tu rostro!";
                }
                preguntaContainer.classList.add("oculto");
                resultadoContainer.classList.remove("oculto");
            }
        }

        function procesarRespuesta(respuesta) {
            const nodo = arbol[estadoActual];
            if (!nodo) return;

            let siguiente = respuesta === "si" ? nodo.si : nodo.no;
            mostrarPregunta(siguiente);
        }

        function reiniciarTest() {
            mostrarPregunta("p1");
        }

        // Event listeners
        btnSi.addEventListener("click", () => procesarRespuesta("si"));
        btnNo.addEventListener("click", () => procesarRespuesta("no"));
        btnReiniciar.addEventListener("click", reiniciarTest);

        // Iniciar el test
        mostrarPregunta("p1");
    </script>
</body>
</html>
